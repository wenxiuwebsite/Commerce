<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Updates — CCCWA</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="news">
<div id="nav-ph"></div>

<div class="page-hero">
  <div class="page-hero-content">
    <h1 data-i18n="news.hero_title">News Updates</h1>
    <p data-i18n="news.hero_sub">Stay up to date with the latest from CCCWA</p>
  </div>
</div>

<section class="section">
  <div class="container">
    <div class="news-layout">

      <!-- Main news feed — populated by js/content.js from content/news.json -->
      <div>
        <div class="news-grid"></div>
      </div>

      <!-- Sidebar with dynamic monthly archives -->
      <aside class="news-sidebar">
        <div class="sidebar-box">
          <h3 data-i18n="news.archive_title">News Archives</h3>
          <div class="archive-list"></div>
        </div>
      </aside>

    </div>
  </div>
</section>

<div id="footer-ph"></div>
<script src="js/layout.js"></script>
<script src="js/main.js"></script>
<script src="js/content.js"></script>
</body>
</html>
