<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article — CCCWA</title>
  <link rel="icon" type="image/png" href="images/favicon-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .article-wrap { max-width: 800px; margin: 0 auto; padding: 48px 24px 80px; }
    .article-back {
      display: inline-flex; align-items: center; gap: 6px; color: var(--accent);
      font-size: 13px; font-weight: 600; text-decoration: none; margin-bottom: 36px;
    }
    .article-back:hover { text-decoration: underline; }
    .article-category {
      display: inline-block; padding: 3px 12px; border-radius: 20px;
      background: var(--accent-lt); color: var(--accent);
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; margin-bottom: 14px;
    }
    .article-title {
      font-size: clamp(22px, 4vw, 34px); font-weight: 800; line-height: 1.2;
      margin-bottom: 12px; color: var(--text);
    }
    .article-meta { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }
    .article-lang-note {
      display: inline-block; font-size: 13px; color: var(--text-muted);
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 14px; margin: -16px 0 28px;
    }
    .article-hero-img {
      width: 100%; max-height: 440px; object-fit: cover; border-radius: 12px; margin-bottom: 36px;
    }
    .article-block-text { font-size: 16px; line-height: 1.85; color: var(--text-secondary); margin-bottom: 28px; overflow-wrap: break-word; word-break: break-word; }
    .article-block-text p { margin-bottom: 16px; }
    .article-block-text p:last-child { margin-bottom: 0; }
    .article-block-text h2 { font-size: 22px; font-weight: 800; margin: 28px 0 12px; color: var(--text); }
    .article-block-text h3 { font-size: 18px; font-weight: 700; margin: 22px 0 10px; color: var(--text); }
    .article-block-text ul, .article-block-text ol { padding-left: 26px; margin-bottom: 16px; }
    .article-block-text li { margin-bottom: 6px; }
    .article-block-text strong { font-weight: 700; color: var(--text); }
    .article-block-text em { font-style: italic; }
    .article-block-text u { text-decoration: underline; }
    .article-block-text a { color: var(--accent); text-decoration: underline; }
    .article-block-text a:hover { opacity: 0.8; }
    .article-block-text img { max-width: 100%; height: auto; border-radius: 8px; }
    .article-block-img { margin: 32px 0; text-align: center; }
    .article-block-img img { max-width: 100%; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .article-block-img figcaption { font-size: 13px; color: var(--text-muted); margin-top: 10px; font-style: italic; overflow-wrap: break-word; word-break: break-word; }
    .article-block-img-text { font-size: 16px; line-height: 1.85; color: var(--text-secondary); margin: 0 0 28px; overflow-wrap: break-word; word-break: break-word; }
    .article-gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 14px; margin: 32px 0; clear: both; }
    .article-gallery figure { margin: 0; }
    .article-gallery img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: block; }
    .article-gallery figcaption { font-size: 12px; color: var(--text-muted); margin-top: 6px; font-style: italic; overflow-wrap: break-word; word-break: break-word; }
    .article-external-link { display: inline-block; margin-top: 12px; font-weight: 600; color: var(--accent); }
    .article-register-btn {
      display: inline-block; margin-top: 24px; padding: 12px 28px;
      background: var(--accent); color: #fff; font-weight: 700; font-size: 14px;
      border-radius: 8px; text-decoration: none;
    }
    .article-register-btn:hover { opacity: 0.9; }
    .article-not-found { text-align: center; padding: 80px 24px; color: var(--text-muted); }
    .article-not-found h2 { font-size: 24px; margin-bottom: 12px; }

    .article-hero-img, .article-block-img img, .article-gallery img, .article-block-text img {
      cursor: zoom-in;
    }
    .lightbox-overlay {
      position: fixed; inset: 0; z-index: 9999; display: none;
      align-items: center; justify-content: center; padding: 32px;
      background: rgba(0,0,0,0.92); cursor: zoom-out;
    }
    .lightbox-overlay.open { display: flex; }
    .lightbox-overlay img {
      max-width: 100%; max-height: 100%; object-fit: contain;
      border-radius: 6px; box-shadow: 0 12px 48px rgba(0,0,0,0.6);
      cursor: default;
    }
    .lightbox-close {
      position: absolute; top: 18px; right: 24px; width: 40px; height: 40px;
      border: none; border-radius: 50%; background: rgba(255,255,255,0.12);
      color: #fff; font-size: 22px; line-height: 1; cursor: pointer;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.22); }
  </style>
</head>
<body data-page="news">
<div id="nav-ph"></div>

<div class="article-wrap">
  <a href="news.html" class="article-back" id="article-back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    <span id="back-label">Back to News</span>
  </a>
  <div id="article-root"></div>
</div>

<div class="lightbox-overlay" id="lightbox" onclick="closeLightbox()">
  <button type="button" class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <img id="lightbox-img" src="" alt="">
</div>

<div id="footer-ph"></div>
<script src="js/layout.js"></script>
<script src="js/main.js"></script>
<script src="js/content.js"></script>
<script>
(function () {
  const C = window.CCCWAContent;
  let newsCache = null;

  function insertBodyImages(container, images) {
    if (!images || !images.length) return;
    const byParagraph = {};
    images.forEach(img => {
      const n = parseInt(img.after_paragraph, 10) || 0;
      (byParagraph[n] = byParagraph[n] || []).push(img);
    });
    let pCount = 0;
    const children = Array.from(container.children);
    children.forEach(node => {
      if (node.tagName === 'P') {
        pCount++;
        const imgs = byParagraph[pCount];
        if (imgs) {
          imgs.forEach(img => {
            const fig = document.createElement('figure');
            fig.className = 'article-block-img';
            const isZh = C.isZh();
            const caption = isZh ? (img.caption_zh || img.caption_en) : (img.caption_en || img.caption_zh);
            const al = img.align || 'center';
            const sz = parseInt(img.size || '100', 10);
            fig.style.cssText = al === 'left'
              ? `float:left;margin:4px 28px 16px 0;max-width:${sz}%`
              : al === 'right'
              ? `float:right;margin:4px 0 16px 28px;max-width:${sz}%`
              : `display:block;margin:0 auto 28px;max-width:${sz}%`;
            fig.innerHTML = '<img src="' + C.escHtml(img.src) + '" alt="' + C.escHtml(img.alt || '') + '">' +
              (caption ? '<figcaption>' + C.escHtml(caption) + '</figcaption>' : '');
            node.insertAdjacentElement('afterend', fig);
            const sideText = isZh ? (img.text_zh || img.text_en) : (img.text_en || img.text_zh);
            if (sideText) {
              const p = document.createElement('p');
              p.className = 'article-block-img-text';
              p.innerHTML = C.escHtml(sideText).replace(/\n/g, '<br>');
              fig.insertAdjacentElement('afterend', p);
            }
          });
        }
      }
    });
  }

  // Groups of images shown together as a grid (not wrapped by text), placed
  // after their target paragraph the same way single images are.
  function insertBodyGalleries(container, galleries) {
    if (!galleries || !galleries.length) return;
    const byParagraph = {};
    galleries.forEach(gal => {
      const n = parseInt(gal.after_paragraph, 10) || 0;
      (byParagraph[n] = byParagraph[n] || []).push(gal);
    });
    let pCount = 0;
    const children = Array.from(container.children);
    children.forEach(node => {
      if (node.tagName === 'P') {
        pCount++;
        const gals = byParagraph[pCount];
        if (gals) {
          gals.forEach(gal => {
            const isZh = C.isZh();
            const imgs = gal.images || [];
            // A "gallery" of exactly one photo isn't really a gallery — show
            // it as a normal centered image instead of an odd single-cell grid.
            const wrap = document.createElement(imgs.length === 1 ? 'figure' : 'div');
            wrap.className = imgs.length === 1 ? 'article-block-img' : 'article-gallery';
            if (imgs.length === 1) wrap.style.cssText = 'display:block;margin:0 auto 28px;max-width:100%';
            imgs.forEach(img => {
              const caption = isZh ? (img.caption_zh || img.caption_en) : (img.caption_en || img.caption_zh);
              // Only the multi-image grid actually crops (object-fit:cover);
              // a lone gallery image renders uncropped, so the focus point
              // only needs to apply there.
              const style = imgs.length === 1 ? '' : ' style="object-position:' + C.escHtml(img.focus || '50% 50%') + '"';
              const imgHtml = '<img src="' + C.escHtml(img.src) + '" alt="' + C.escHtml(img.alt || '') + '"' + style + '>' +
                (caption ? '<figcaption>' + C.escHtml(caption) + '</figcaption>' : '');
              if (imgs.length === 1) {
                wrap.innerHTML = imgHtml;
              } else {
                const fig = document.createElement('figure');
                fig.innerHTML = imgHtml;
                wrap.appendChild(fig);
              }
            });
            node.insertAdjacentElement('afterend', wrap);
          });
        }
      }
    });
  }

  function renderArticle() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const root = document.getElementById('article-root');
    const isZh = C.isZh();

    document.getElementById('back-label').textContent = isZh ? '返回新闻' : 'Back to News';

    if (!newsCache) return; // still loading

    if (!id) {
      root.innerHTML = '<div class="article-not-found"><h2>Article not found</h2></div>';
      return;
    }

    const article = newsCache.find(n => n.id === id);
    if (!article) {
      root.innerHTML = '<div class="article-not-found"><h2>Article not found</h2><p>This article may have been removed or the URL is incorrect.</p></div>';
      return;
    }

    const title    = isZh ? (article.title_zh    || article.title_en)    : (article.title_en || article.title_zh);
    const category = isZh ? (article.category_zh || article.category_en) : (article.category_en || article.category_zh);
    const date     = C.formatDate(article.date, isZh);
    const body     = isZh ? (article.body_zh || article.body_en) : (article.body_en || article.body_zh);
    const summary  = isZh ? (article.summary_zh || article.summary_en) : (article.summary_en || article.summary_zh);

    document.title = (title || 'Article') + ' — CCCWA';

    let html = '<div class="article-category">' + C.escHtml(category || '') + '</div>' +
      '<h1 class="article-title">' + C.escHtml(title || '') + '</h1>' +
      '<div class="article-meta">' + C.escHtml(date) + '</div>';

    // This article only ever existed in one language (common for older,
    // migrated archive posts) — say so plainly instead of silently showing
    // the other language, which can look like the toggle is broken.
    const hasZhTitle = !!article.title_zh, hasEnTitle = !!article.title_en;
    if (hasZhTitle !== hasEnTitle) {
      const noteZh = hasZhTitle ? '本文仅提供中文版本。' : '本文仅提供英文版本。';
      const noteEn = hasZhTitle ? 'This article was only ever published in Chinese.' : 'This article was only ever published in English.';
      html += '<div class="article-lang-note">' + C.escHtml(isZh ? noteZh : noteEn) + '</div>';
    }

    if (article.cover_image) {
      html += '<img class="article-hero-img" src="' + C.escHtml(article.cover_image) + '" alt="' + C.escHtml(title || '') +
        '" style="object-position:' + C.escHtml(article.cover_focus || '50% 50%') + '">';
    }

    root.innerHTML = html;

    const bodyWrap = document.createElement('div');
    bodyWrap.className = 'article-block-text';
    if (body) {
      bodyWrap.innerHTML = window.marked ? window.marked.parse(body) : body.replace(/\n\n+/g, '</p><p>').replace(/^/, '<p>').replace(/$/, '</p>');
      insertBodyImages(bodyWrap, article.body_images);
      insertBodyGalleries(bodyWrap, article.body_galleries);
    } else if (summary) {
      bodyWrap.innerHTML = '<p>' + C.escHtml(summary) + '</p>';
    }
    root.appendChild(bodyWrap);

    const extLink = article.external_link;
    if (extLink) {
      const label = isZh
        ? (article.external_link_label_zh || article.external_link_label_en || '阅读原文 →')
        : (article.external_link_label_en || article.external_link_label_zh || 'Read original →');
      const a = document.createElement('a');
      a.href = extLink; a.target = '_blank'; a.rel = 'noopener';
      a.className = 'article-external-link';
      a.textContent = label;
      root.appendChild(a);
    }

    if ((article.category_en || '').trim().toLowerCase() === 'event') {
      const reg = document.createElement('a');
      reg.href = article.register_url || 'contact.html';
      reg.className = 'article-register-btn';
      reg.textContent = isZh ? '报名' : 'Register';
      root.appendChild(reg);
    }

    root.appendChild(document.createElement('div')).style.clear = 'both';
  }

  C.fetchJSON('content/news.json').then(data => {
    newsCache = C.ensureIds(data.items || []);
    renderArticle();
  }).catch(() => {
    document.getElementById('article-root').innerHTML =
      '<div class="article-not-found"><h2>Article not found</h2><p>Could not load article data.</p></div>';
  });

  // Re-render when language changes (main.js updates html[lang])
  new MutationObserver(renderArticle).observe(document.documentElement, {
    attributes: true, attributeFilter: ['lang']
  });

  // Fullscreen lightbox — click any article image (hero, inline, gallery) to
  // view it uncropped/unscaled, since inline images are float-sized or
  // grid-cropped and can otherwise look cut off.
  document.getElementById('article-root').addEventListener('click', e => {
    const img = e.target.closest('img');
    if (!img) return;
    document.getElementById('lightbox-img').src = img.src;
    document.getElementById('lightbox-img').alt = img.alt || '';
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  });
  window.closeLightbox = function () {
    document.getElementById('lightbox').classList.remove('open');
    document.getElementById('lightbox-img').src = '';
    document.body.style.overflow = '';
  };
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
})();
</script>
</body>
</html>
