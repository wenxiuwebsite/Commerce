# ============================================================
# Decap CMS — CCC-WA Configuration
# ============================================================
#
# LOCAL DEVELOPMENT
#   1. Run `npx decap-server` in this project folder
#   2. Open http://localhost:8081/admin in your browser
#   3. The local_backend below lets you edit without GitHub auth
#
# PRODUCTION (Netlify)
#   1. Comment out `local_backend: true`
#   2. Uncomment the `backend:` block and fill in your repo
#   3. Enable Identity + Git Gateway in Netlify dashboard
#
# ============================================================

local_backend: true

# backend:
#   name: git-gateway
#   branch: main

media_folder:  "images/uploads"
public_folder: "/images/uploads"

# ============================================================
# COLLECTIONS
# ============================================================

collections:

  # ---- EVENTS -----------------------------------------------
  - name:   "events"
    label:  "Events"
    label_singular: "Event"
    folder: "content/events"
    create: true
    slug:   "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title (English)",          name: title_en,    widget: string }
      - { label: "Title (Chinese 中文)",      name: title_zh,    widget: string }
      - { label: "Date & Time",              name: date,        widget: datetime }
      - { label: "Month Label (e.g. JUL)",   name: month_label, widget: string }
      - { label: "Day Number",               name: day_number,  widget: string }
      - { label: "Location (English)",        name: location_en, widget: string }
      - { label: "Location (Chinese 中文)",   name: location_zh, widget: string }
      - { label: "Description (English)",     name: desc_en,     widget: text }
      - { label: "Description (Chinese 中文)",name: desc_zh,     widget: text }
      - { label: "Registration URL",         name: register_url,widget: string, required: false }
      - { label: "Published",               name: published,   widget: boolean, default: true }

  # ---- NEWS -------------------------------------------------
  - name:   "news"
    label:  "News Articles"
    label_singular: "Article"
    folder: "content/news"
    create: true
    slug:   "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title (English)",          name: title_en,   widget: string }
      - { label: "Title (Chinese 中文)",      name: title_zh,   widget: string }
      - label: "Category"
        name:  category
        widget: select
        options: ["Announcement", "Programs", "Event Recap", "Community"]
      - { label: "Date",                     name: date,       widget: datetime }
      - { label: "Featured Image",           name: image,      widget: image, required: false }
      - { label: "Excerpt (English)",         name: excerpt_en, widget: text }
      - { label: "Excerpt (Chinese 中文)",    name: excerpt_zh, widget: text }
      - { label: "Full Article (English)",    name: body_en,    widget: markdown }
      - { label: "Full Article (Chinese 中文)",name: body_zh,   widget: markdown }
      - { label: "Published",               name: published,  widget: boolean, default: true }

  # ---- PROGRAMS ---------------------------------------------
  - name:   "programs"
    label:  "Programs"
    label_singular: "Program"
    folder: "content/programs"
    create: true
    fields:
      - { label: "Title (English)",          name: title_en, widget: string }
      - { label: "Title (Chinese 中文)",      name: title_zh, widget: string }
      - { label: "Icon (emoji)",             name: icon,     widget: string }
      - { label: "Description (English)",     name: desc_en,  widget: text }
      - { label: "Description (Chinese 中文)",name: desc_zh,  widget: text }
      - { label: "Display Order",            name: order,    widget: number, default: 0 }
      - { label: "Active",                   name: active,   widget: boolean, default: true }

  # ---- PAGE CONTENT (singleton files) ----------------------
  - name:  "pages"
    label: "Page Content"
    files:

      - label: "Homepage Hero & About"
        name:  "home"
        file:  "content/pages/home.json"
        fields:
          - { label: "Hero Badge (EN)", name: hero_badge_en, widget: string }
          - { label: "Hero Badge (ZH)", name: hero_badge_zh, widget: string }
          - { label: "Hero Title (EN)", name: hero_title_en, widget: string }
          - { label: "Hero Title (ZH)", name: hero_title_zh, widget: string }
          - { label: "Hero Subtitle (EN)", name: hero_sub_en, widget: text }
          - { label: "Hero Subtitle (ZH)", name: hero_sub_zh, widget: text }
          - { label: "About Para 1 (EN)", name: about_p1_en, widget: text }
          - { label: "About Para 1 (ZH)", name: about_p1_zh, widget: text }
          - { label: "About Para 2 (EN)", name: about_p2_en, widget: text }
          - { label: "About Para 2 (ZH)", name: about_p2_zh, widget: text }

      - label: "Contact Info"
        name:  "contact"
        file:  "content/pages/contact.json"
        fields:
          - { label: "Street Address",  name: address, widget: string }
          - { label: "City/State/Zip",  name: city,    widget: string }
          - { label: "Phone",           name: phone,   widget: string }
          - { label: "Email",           name: email,   widget: string }
          - { label: "Hours (EN)",      name: hours_en,widget: text }
          - { label: "Hours (ZH)",      name: hours_zh,widget: text }

      - label: "Donation Settings"
        name:  "donate"
        file:  "content/pages/donate.json"
        fields:
          - { label: "Donation Page URL", name: donate_url, widget: string }
          - { label: "Title (EN)",        name: title_en,   widget: string }
          - { label: "Title (ZH)",        name: title_zh,   widget: string }
          - { label: "Description (EN)",  name: desc_en,    widget: text }
          - { label: "Description (ZH)",  name: desc_zh,    widget: text }
